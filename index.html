<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冯美源 - 沁祥酒业</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            width: 100%;
            max-width: 400px;
            background: #0A3D62;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(10,61,98,0.3);
            overflow: hidden;
            padding: 40px 20px;
            text-align: center;
            color: #fff;
        }
        .logo-placeholder {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .company-name {
            font-size: 26px;
            font-weight: bold;
            color: #FFFFFF;
            letter-spacing: 6px;
            margin-bottom: 10px;
        }
        .name {
            font-size: 32px;
            font-weight: 600;
            color: #F1C40F;
            margin-bottom: 8px;
        }
        .title {
            font-size: 18px;
            color: #ECF0F1;
            margin-bottom: 24px;
        }
        .contact-info {
            text-align: left;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .contact-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.5;
        }
        .contact-item i {
            margin-right: 10px;
            color: #F1C40F;
            flex-shrink: 0;
        }
        .footer {
            margin-top: 28px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- LOGO占位，上传logo.png后替换为 <img src="logo.png" class="logo-img"> -->
        <div class="logo-placeholder">🍷</div>

        <div class="company-name">沁祥酒业</div>
        <div class="name">冯美源</div>
        <div class="title">营销总监 · 诚招加盟</div>

        <div class="contact-info">
            <div class="contact-item">
                <i>📱</i> 132 1936 0813
            </div>
            <div class="contact-item">
                <i>📍</i> 四川省泸州市江阳区宝珠街4号1幢5层
            </div>
            <div class="contact-item">
                <i>🏢</i> 四川沁祥供应链管理有限公司
            </div>
        </div>

        <div class="footer">窖藏纯粮散酒 · 传承匠心</div>
    </div>
</body>
</html>
